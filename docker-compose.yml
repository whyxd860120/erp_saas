version: '3.8'

services:
  # MySQL 8.0 ж•°жҚ®еә?  mysql:
    image: bitnami/mysql:8.0
    container_name: inventory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: inventory_saas
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis зј“еӯҳ
  redis:
    image: bitnami/redis:7
    container_name: inventory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Adminer - ж•°жҚ®еә“з®ЎзҗҶе·Ҙе…·пјҲеҸҜйҖүпјү
  adminer:
    image: adminer:latest
    container_name: inventory-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - inventory-network
    depends_on:
      - mysql

networks:
  inventory-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
